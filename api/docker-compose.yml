services:
  api:
    build: .
    container_name: kupreu-api
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-kupreu}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: ${MYSQL_USER:-kupreu}
      DB_PASSWORD: ${MYSQL_PASSWORD:-kupreu}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/kupreu}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      RATE_LIMIT_CAPACITY: ${RATE_LIMIT_CAPACITY:-20}
      RATE_LIMIT_REFILL_TOKEN: ${RATE_LIMIT_REFILL_TOKEN:-20}
      RATE_LIMIT_REFILL_PERIOD: ${RATE_LIMIT_REFILL_PERIOD:-PT1M}
    depends_on:
      - mysql
      - redis
      - mongo
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kupreu}
      MYSQL_USER: ${MYSQL_USER:-kupreu}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-kupreu}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  redis:
    image: redis:7
    container_name: kupreu-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

  mongo:
    image: mongo:7
    container_name: kupreu-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

volumes:
  mysql_data:
  redis_data:
  mongo_data:

networks:
  app-network:
    driver: bridge
